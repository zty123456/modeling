name: deepseek_v4_pro_ascend_910c
description: "DeepSeek-V4-Pro 1.6T, Ascend 910C, TP8 PP4 EP64 DP2, DualPipeV, Muon, 8 nodes"
model: deepseek_v4_pro
system:
  hw: ascend_910c
  nodes: 8
  gpus_per_node: 8
  host_mem_gb: 2048
config:
  tp: 8
  pp: 4
  ep: 64
  dp: 2
  zero_stage: 1
  micro_batch: 1
  global_batch: 512
  pp_schedule: dualpipev
  optimizer: muon
  muon_config:
    ns_steps: 10
    rotation: true
    adam_param_types: ["embed", "lm_head", "router", "bias"]
    muon_param_fraction: 0.85
targets:
  mfu: 0.1203
  tolerance: 0.20
