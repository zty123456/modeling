name: deepseek_v3
description: "DeepSeek-V3 671B MoE, reference, H100 SXM, TP8 PP1 DP8 (8 nodes). NOTE: EP=1 until Phase-3 EP rank-product policy is resolved."
model: deepseek_v3
system:
  hw: nvidia_h100_sxm
  nodes: 8
  gpus_per_node: 8
  host_mem_gb: 512
config:
  tp: 8
  pp: 1
  ep: 1
  dp: 8
  zero_stage: 1
  micro_batch: 1
  global_batch: 1024
targets:
  # step_time_ms re-derived after achieved_flops_efficiency calibration to MLPerf v4.0.
  # No directly comparable published source for this 64-GPU config
  # (paper uses 2048 H800 with TP8 PP16 EP64 — different scale and topology).
  # Pin acts as a regression guard for FLOPs formula and MoE active-param accounting.
  mfu: 0.4215
  step_time_ms: 47800
  tolerance: 0.20
  strict_mfu_check: false
