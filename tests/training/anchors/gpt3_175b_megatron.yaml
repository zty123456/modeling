name: gpt3_175b_megatron
description: "GPT-3 175B, Megatron-LM reference, H100 SXM, TP8 PP1 DP64"
model:
  name: gpt3-175b
  hidden: 12288
  ffn: 49152
  num_heads: 96
  num_kv_heads: 96
  head_dim: 128
  vocab: 50257
  seq_len: 2048
  layers: "[dense]*96"
  param_dtype: bf16
  grad_dtype: fp32
  master_dtype: fp32
  act_dtype: bf16
system:
  hw: nvidia_h100_sxm
  nodes: 64
  gpus_per_node: 8
  host_mem_gb: 512
config:
  tp: 8
  pp: 1
  dp: 64
  zero_stage: 1
  micro_batch: 1
  global_batch: 1536
targets:
  # MFU re-audited against NVIDIA MLPerf Training v4.0 (June 2024):
  # 904 TFLOPs/sec/GPU at 512 H100 GPUs in FP8 mixed precision.
  # BF16 throughput on H100 is half of FP8 (peak ratio 989/1979),
  # giving ~452 TFLOPs/sec/GPU BF16 → MFU = 452/989 ≈ 0.46.
  # Source: https://developer.nvidia.com/blog/nvidia-sets-new-generative-ai-performance-and-scale-records-in-mlperf-training-v4-0/
  # Simulator calibrated 2026-05-11: sim MFU=0.477, step_time=18733ms.
  mfu: 0.46
  step_time_ms: 19400
  tolerance: 0.10
