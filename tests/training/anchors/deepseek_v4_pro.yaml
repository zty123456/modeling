# DeepSeek-V4-Pro reference baseline — updated with real V4-Pro geometry
# V4-Pro: 1.6T params, 61 MoE layers (30 CSA + 31 HCA), Muon optimizer

name: deepseek_v4_pro
description: "DeepSeek-V4-Pro 1.6T, H100 SXM, TP8 PP4 EP64 DP4, Muon, 8 nodes"
model: deepseek_v4_pro
system:
  hw: nvidia_h100_sxm
  nodes: 8
  gpus_per_node: 8
  host_mem_gb: 2048
config:
  tp: 8
  pp: 4
  ep: 64
  dp: 2
  zero_stage: 1
  micro_batch: 1
  global_batch: 512
  pp_schedule: dualpipev
  optimizer: muon
  muon_config:
    ns_steps: 10
    rotation: true
    adam_param_types: ["embed", "lm_head", "router", "bias"]
    muon_param_fraction: 0.85
targets:
  mfu: 0.0823
  tolerance: 0.15
