name: "NVIDIA H100 SXM"
vendor: "nvidia"
device_type: "gpu"

compute:
  # Dense (no sparsity). With 2:4 sparsity all values double.
  fp16_tflops: 989
  bf16_tflops: 989
  fp32_tflops: 66.9
  int8_tops: 1978
  int4_tops: 3958
  fp8_tops: 3958    # FP8 E4M3 / E5M2 (Transformer Engine)

  # Heterogeneous-core split:
  # - cube/matrix: dense Tensor Core BF16 peak (no sparsity)
  # - vector: CUDA-core scalar/vector peak, using FP32 peak as the BF16
  #   elementwise roofline proxy
  cube_bf16_tflops: 989
  vector_bf16_tflops: 66.9
  overlap_ratio:
    attn_core: 0.6
  sram_kb_per_sm: 228
  ep_overlap_waves: 4   # K-wave EP A2A overlap (CUDA stream-based, DeepSeek-style)

memory:
  capacity_gb: 80
  hbm_bandwidth_gbps: 3350    # HBM3
  l2_cache_mb: 50
  tiers:
    - { name: "L2",  bandwidth_gbps: 12288, capacity_mb: 50 }
    - { name: "HBM", bandwidth_gbps: 3350,  capacity_mb: 0  }

interconnect:
  intra_node:
    type: "NVLink4"
    # 18 NVLink 4.0 ports, 50 GB/s bidirectional each → 900 GB/s total
    bandwidth_gbps: 900
    latency_us: 1
    topology: "all_to_all"
    num_devices: 8
  inter_node:
    type: "InfiniBand_NDR"
    bandwidth_gbps: 400       # NDR IB: 400 Gb/s ≈ 50 GB/s per port; 8-port = 400 GB/s
    latency_us: 2
    topology: "fat_tree"
    num_devices: 0
