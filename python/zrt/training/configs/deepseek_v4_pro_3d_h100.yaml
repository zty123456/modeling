# DeepSeek-V4-Pro 3D parallel training — H100 SXM
model: deepseek_v4_pro

system:
  hw: nvidia_h100_sxm
  nodes: 1024
  gpus_per_node: 8
  host_mem_gb: 2048

strategy:
  tp: 1
  cp: 8
  pp: 2
  ep: 384
  dp: 512
  micro_batch: 1
  global_batch: 512
  pp_schedule: dualpipev
  vpp_chunks: 2
  zero_stage: 3
  recompute:
    per_layer:
      moe: ["attn"]
  tp_overlap: none
  optimizer: muon
  muon_config:
    ns_steps: 10
    rotation: true
    adam_param_types: ["embed", "lm_head", "router", "bias"]
    muon_param_fraction: 0.85
