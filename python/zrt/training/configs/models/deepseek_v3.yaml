# DeepSeek-V3-like model specification
# Reference: https://arxiv.org/pdf/2412.19437

name: deepseek-v3
hidden: 7168
ffn: 18432
num_heads: 128
num_kv_heads: 128
head_dim: 128
vocab: 129280
seq_len: 4096
layers: "[dense]*3+[moe]*57+[mtp]*1"
num_experts: 256
moe_ffn: 2048         # per-expert FFN hidden (DeepSeek-V3 official)
top_k: 8
n_group: 8            # group-limited gating
top_k_group: 4        # top-k groups selected
n_shared_experts: 1   # shared experts per MoE layer
capacity_factor: 1.0
expert_imbalance: 0.10
mtp_depth: 1
param_dtype: bf16
grad_dtype: fp32
master_dtype: fp32
act_dtype: bf16
