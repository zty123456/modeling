# DeepSeek-V3.2 model specification (= V3 + Lightning Indexer / DSA)
# Reference: https://arxiv.org/pdf/2512.02556

name: deepseek-v3-2
hidden: 10240
ffn: 43520
num_heads: 128
num_kv_heads: 128       # MLA: projected back to num_heads KV
head_dim: 128           # qk_nope_head_dim only; effective MLA QK = qk_nope+qk_rope=192
vocab: 129280
seq_len: 65536
layers: "[dense]*3+[moe]*77"

# MLA (Multi-head Latent Attention) — same as V3
q_lora_rank: 4096
kv_lora_rank: 1536
qk_nope_head_dim: 128
qk_rope_head_dim: 64
q_head_dim: 192
v_head_dim: 128

# Lightning Indexer / DSA (V3.2 addition)
attn_type: dsa
index_n_heads: 128
index_head_dim: 512
index_topk: 4096

# MoE — same as V3
num_experts: 1024
route_expert_hidden: 3072
top_k: 32
n_group: 8
top_k_group: 4
n_shared_experts: 1
capacity_factor: 1.0
expert_imbalance: 0.10
scoring_func: sigmoid

norm: RMSNorm
embedding_output_share: true
